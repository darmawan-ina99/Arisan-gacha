<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Arisan Gacha 🎰</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="app">
    <header>
      <h1>🎰 Arisan Gacha</h1>
      <p class="subtitle">Sistem Arisan Digital Otomatis</p>
    </header>

    <nav class="tabs">
      <button class="tab active" onclick="showTab('beranda')">🏠 Beranda</button>
      <button class="tab" onclick="showTab('anggota')">👥 Anggota</button>
      <button class="tab" onclick="showTab('undian')">🎯 Undian</button>
      <button class="tab" onclick="showTab('riwayat')">📋 Riwayat</button>
    </nav>

    <!-- BERANDA -->
    <div id="tab-beranda" class="tab-content active">
      <div class="card">
        <h2>Info Arisan</h2>
        <div class="info-grid">
          <div class="info-box">
            <span class="label">Total Anggota</span>
            <span class="value" id="total-anggota">0</span>
          </div>
          <div class="info-box">
            <span class="label">Belum Dapat</span>
            <span class="value" id="belum-dapat">0</span>
          </div>
          <div class="info-box">
            <span class="label">Sudah Dapat</span>
            <span class="value" id="sudah-dapat">0</span>
          </div>
          <div class="info-box">
            <span class="label">Total Iuran</span>
            <span class="value" id="total-iuran">Rp 0</span>
          </div>
        </div>
      </div>
      <div class="card">
        <h2>⚙️ Pengaturan Arisan</h2>
        <label>Nama Grup</label>
        <input type="text" id="nama-grup" placeholder="Contoh: Arisan RT 05" />
        <label>Iuran per Orang (Rp)</label>
        <input type="number" id="iuran" placeholder="500000" />
        <button class="btn-primary" onclick="simpanPengaturan()">💾 Simpan</button>
      </div>
    </div>

    <!-- ANGGOTA -->
    <div id="tab-anggota" class="tab-content">
      <div class="card">
        <h2>➕ Tambah Anggota</h2>
        <input type="text" id="nama-anggota" placeholder="Nama anggota" />
        <input type="text" id="no-hp" placeholder="No. HP / WhatsApp" />
        <button class="btn-primary" onclick="tambahAnggota()">➕ Tambah</button>
      </div>
      <div class="card">
        <h2>👥 Daftar Anggota</h2>
        <div id="list-anggota"></div>
      </div>
    </div>

    <!-- UNDIAN -->
    <div id="tab-undian" class="tab-content">
      <div class="card text-center">
        <h2>🎯 Undian Arisan</h2>
        <div class="drum" id="drum">
          <div class="drum-display" id="drum-display">?</div>
        </div>
        <button class="btn-gacha" id="btn-undian" onclick="mulaiUndian()">🎰 MULAI UNDIAN!</button>
        <p id="status-undian" class="status-text"></p>
      </div>
    </div>

    <!-- RIWAYAT -->
    <div id="tab-riwayat" class="tab-content">
      <div class="card">
        <h2>📋 Riwayat Pemenang</h2>
        <div id="list-riwayat"></div>
      </div>
      <div class="card">
        <button class="btn-danger" onclick="resetArisan()">🔄 Reset Arisan (Periode Baru)</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
